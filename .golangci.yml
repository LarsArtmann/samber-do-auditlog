version: "2"
run:
  timeout: 5m
  go: 1.26.3
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - clickhouselint
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        main:
          files:
            - "!**/*_test.go"
            - "!**/example/**"
          allow:
            - $gostd
            - github.com/a-h/templ
            - github.com/larsartmann/samber-do-auditlog
            - github.com/samber
        example:
          files:
            - "**/example/**"
          allow:
            - $gostd
            - github.com/a-h/templ
            - github.com/larsartmann/samber-do-auditlog
            - github.com/samber
        tests:
          files:
            - "**/*_test.go"
          allow:
            - $gostd
            - github.com/a-h/templ
            - github.com/larsartmann/samber-do-auditlog
            - github.com/samber
    exhaustruct:
      exclude:
        - os/exec.Cmd
        - do.InjectorOpts
        - sync.RWMutex
        - sync.Mutex
        - atomic.Int64
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    tagliatelle:
      case:
        rules:
          json: snake
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - fn
        - t
        - i
        - m
        - g
        - a
        - b
        - v
      ignore-type-assert-ok: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - exhaustruct
          - testpackage
          - gochecknoglobals
          - funlen
          - cyclop
          - goconst
          - staticcheck
      - path: _test\.go
        text: unused
        linters:
          - unused
      - path: example/
        linters:
          - forbidigo
          - funlen
          - mnd
          - unparam
          - varnamelen
          - noinlineerr
      - path: _test\.go
        linters:
          - paralleltest
          - noinlineerr
          - gosec
          - varnamelen
    paths:
      - _templ\.go$
      - \.gen\.go$
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
